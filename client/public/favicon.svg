<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7f8c8d"/>
      <stop offset="50%" stop-color="#ecf0f1"/>
      <stop offset="100%" stop-color="#7f8c8d"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#4a154b" stroke-width="2"/>

  <!-- Левый меч — от левого-низа к правому-верху -->
  <g transform="rotate(-35, 32, 32)">
    <!-- Клинок -->
    <rect x="30" y="8" width="4" height="34" rx="2" fill="url(#blade)"/>
    <!-- Остриё -->
    <polygon points="30,8 34,8 32,3" fill="#ecf0f1"/>
    <!-- Гарда -->
    <rect x="24" y="40" width="16" height="3" rx="1" fill="#8b0000"/>
    <!-- Рукоять -->
    <rect x="30" y="43" width="4" height="10" rx="1" fill="#4a2c0a"/>
    <!-- Навершие -->
    <circle cx="32" cy="54" r="2.5" fill="#8b0000"/>
  </g>

  <!-- Правый меч — от правого-низа к левому-верху -->
  <g transform="rotate(35, 32, 32)">
    <!-- Клинок -->
    <rect x="30" y="8" width="4" height="34" rx="2" fill="url(#blade)"/>
    <!-- Остриё -->
    <polygon points="30,8 34,8 32,3" fill="#ecf0f1"/>
    <!-- Гарда -->
    <rect x="24" y="40" width="16" height="3" rx="1" fill="#8b0000"/>
    <!-- Рукоять -->
    <rect x="30" y="43" width="4" height="10" rx="1" fill="#4a2c0a"/>
    <!-- Навершие -->
    <circle cx="32" cy="54" r="2.5" fill="#8b0000"/>
  </g>

  <!-- Череп -->
  <!-- Верхняя часть черепа -->
  <ellipse cx="32" cy="28" rx="11" ry="12" fill="#2c2c3a" stroke="#555" stroke-width="1"/>
  <!-- Челюсть -->
  <rect x="25" y="35" width="14" height="8" rx="3" fill="#2c2c3a" stroke="#555" stroke-width="1"/>
  <!-- Зубы -->
  <line x1="28" y1="35" x2="28" y2="40" stroke="#555" stroke-width="0.8"/>
  <line x1="32" y1="35" x2="32" y2="40" stroke="#555" stroke-width="0.8"/>
  <line x1="36" y1="35" x2="36" y2="40" stroke="#555" stroke-width="0.8"/>

  <!-- Глазницы -->
  <circle cx="27" cy="27" r="4" fill="#0d0d1a"/>
  <circle cx="37" cy="27" r="4" fill="#0d0d1a"/>
  <!-- Свечение глаз -->
  <circle cx="27" cy="27" r="2" fill="#8b0000"/>
  <circle cx="37" cy="27" r="2" fill="#8b0000"/>

  <!-- Нос -->
  <path d="M30 31 L32 33 L34 31" fill="none" stroke="#555" stroke-width="1"/>
</svg>
